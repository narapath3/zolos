<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="badge" x1="14" y1="4" x2="50" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b46ff"/>
      <stop offset=".55" stop-color="#5a1fd6"/>
      <stop offset="1" stop-color="#2c0f6b"/>
    </linearGradient>
    <linearGradient id="gold" x1="18" y1="14" x2="46" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe89a"/>
      <stop offset=".5" stop-color="#ffc046"/>
      <stop offset="1" stop-color="#ff8a1e"/>
    </linearGradient>
    <radialGradient id="gloss" cx="32" cy="16" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="zshadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1" flood-color="#1a0640" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Gem badge -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#badge)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#gloss)"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="14.5" fill="none" stroke="#c9a5ff" stroke-opacity=".55" stroke-width="1.6"/>

  <!-- Bold Z monogram -->
  <g filter="url(#zshadow)">
    <path d="M18 16 H46 V24 L29 40 H46 V48 H18 V40 L35 24 H18 Z"
          fill="url(#gold)" stroke="#9a4a00" stroke-opacity=".45" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- Sparkle -->
  <path d="M47 13 l1.3 3.1 3.1 1.3 -3.1 1.3 -1.3 3.1 -1.3 -3.1 -3.1 -1.3 3.1 -1.3 Z" fill="#fff7dc"/>
</svg>
